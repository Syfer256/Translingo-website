<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - TransLingo</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">TransLingo</div>
            <ul class="navbar-menu" id="navMenu"></ul>
            <div class="navbar-actions">
                <div class="notification-icon">
                    <i class="fas fa-bell"></i>
                    <span class="notification-badge" style="display: none;">0</span>
                </div>
                <button class="btn btn-secondary btn-sm" id="userMenuBtn">
                    <span id="userName">User</span> ▾
                </button>
            </div>
        </div>
    </nav>

    <!-- Messages Page -->
    <div class="messages-container">
        <div class="container-fluid">
            <div class="row" style="height: calc(100vh - 80px);">
                <!-- Conversations List -->
                <div class="col-4" style="border-right: 1px solid var(--gray-lighter); overflow-y: auto;">
                    <div style="padding: var(--spacing-lg);">
                        <h2>Messages</h2>
                        <input type="text" id="searchConversations" placeholder="Search conversations..."
                            style="width: 100%; margin-top: var(--spacing-md);">
                    </div>
                    <div id="conversationsList"></div>
                </div>

                <!-- Chat Area -->
                <div class="col-8" style="display: flex; flex-direction: column;">
                    <div id="chatHeader" class="chat-header" style="display: none;">
                        <div>
                            <h3 id="chatUserName"></h3>
                            <p id="chatJobTitle" style="color: var(--gray); font-size: 0.875rem;"></p>
                        </div>
                        <a id="viewJobLink" class="btn btn-sm btn-outline">
                            <i class="fas fa-briefcase"></i> View Job
                        </a>
                    </div>

                    <div id="chatMessages" class="chat-messages"
                        style="flex: 1; overflow-y: auto; padding: var(--spacing-lg);"></div>

                    <div id="chatInput" class="chat-input" style="display: none;">
                        <form id="messageForm"
                            style="display: flex; gap: var(--spacing-md); padding: var(--spacing-lg); border-top: 1px solid var(--gray-lighter);">
                            <input type="text" id="messageText" placeholder="Type your message..." style="flex: 1;"
                                required>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-paper-plane"></i> Send
                            </button>
                        </form>
                    </div>

                    <div id="emptyState" class="empty-state"
                        style="display: flex; align-items: center; justify-content: center; height: 100%;">
                        <div style="text-align: center;">
                            <i class="fas fa-comments"
                                style="font-size: 4rem; color: var(--gray-light); margin-bottom: var(--spacing-lg);"></i>
                            <h3>Select a conversation</h3>
                            <p style="color: var(--gray);">Choose a conversation from the list to start messaging</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/jobs.js"></script>
    <script src="js/messaging.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/sample-data.js"></script>

    <script>
        // Check authentication
        if (!Auth.requireAuth()) {
            window.location.href = 'auth.html';
        }

        const currentUser = Auth.getCurrentUser();
        document.getElementById('userName').textContent = currentUser.firstName;

        // Set up navigation based on role
        const navMenu = document.getElementById('navMenu');
        if (currentUser.role === CONFIG.USER_ROLES.EMPLOYER) {
            navMenu.innerHTML = `
                <li><a href="employer-dashboard.html">Dashboard</a></li>
                <li><a href="post-job.html">Post Job</a></li>
                <li><a href="transactions.html">Transactions</a></li>
                <li><a href="messages.html">Messages</a></li>
            `;
        } else if (currentUser.role === CONFIG.USER_ROLES.FREELANCER) {
            navMenu.innerHTML = `
                <li><a href="freelancer-dashboard.html">Dashboard</a></li>
                <li><a href="jobs.html">Browse Jobs</a></li>
                <li><a href="transactions.html">Earnings</a></li>
                <li><a href="messages.html">Messages</a></li>
            `;
        }

        let currentConversationId = null;
        let messageRefreshInterval = null;

        // Load conversations
        function loadConversations() {
            const conversations = Messaging.getConversations();
            const conversationsList = document.getElementById('conversationsList');

            if (conversations.length === 0) {
                conversationsList.innerHTML = '<div class="empty-state"><p>No conversations yet</p></div>';
                return;
            }

            conversationsList.innerHTML = conversations.map(conv => {
                const otherUser = conv.participants.find(p => p.id !== currentUser.id);
                const unreadCount = conv.unreadCount || 0;

                return `
                    <div class="conversation-item ${conv.id === currentConversationId ? 'active' : ''}" 
                         onclick="openConversation('${conv.id}')">
                        <div style="flex: 1;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-xs);">
                                <strong>${otherUser.name}</strong>
                                <span style="font-size: 0.75rem; color: var(--gray);">
                                    ${Utils.formatRelativeTime(conv.lastMessageAt)}
                                </span>
                            </div>
                            <div style="font-size: 0.875rem; color: var(--gray);">
                                ${Utils.truncate(conv.jobTitle, 40)}
                            </div>
                            <div style="font-size: 0.875rem; color: var(--gray); margin-top: var(--spacing-xs);">
                                ${Utils.truncate(conv.lastMessage, 50)}
                            </div>
                        </div>
                        ${unreadCount > 0 ? `
                            <span class="badge badge-primary" style="margin-left: var(--spacing-sm);">
                                ${unreadCount}
                            </span>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        window.openConversation = function (conversationId) {
            currentConversationId = conversationId;
            const conversation = Messaging.getConversation(conversationId);

            if (!conversation) return;

            const otherUser = conversation.participants.find(p => p.id !== currentUser.id);
            const job = Jobs.getById(conversation.jobId);

            // Update header
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('chatUserName').textContent = otherUser.name;
            document.getElementById('chatJobTitle').textContent = job ? job.title : 'Job';
            document.getElementById('viewJobLink').href = `job-detail.html?id=${conversation.jobId}`;

            // Show input
            document.getElementById('chatInput').style.display = 'block';
            document.getElementById('emptyState').style.display = 'none';

            // Mark as read
            Messaging.markAsRead(conversationId);

            // Load messages
            loadMessages();

            // Refresh conversations list
            loadConversations();

            // Auto-refresh messages
            if (messageRefreshInterval) {
                clearInterval(messageRefreshInterval);
            }
            messageRefreshInterval = setInterval(loadMessages, 3000);
        };

        function loadMessages() {
            if (!currentConversationId) return;

            const messages = Messaging.getMessages(currentConversationId);
            const chatMessages = document.getElementById('chatMessages');

            chatMessages.innerHTML = messages.map(msg => {
                const isOwn = msg.senderId === currentUser.id;
                return `
                    <div class="message ${isOwn ? 'message-own' : 'message-other'}">
                        <div class="message-content">
                            ${Utils.escapeHTML(msg.content)}
                        </div>
                        <div class="message-time">
                            ${Utils.formatDate(msg.createdAt, 'time')}
                            ${isOwn && msg.isRead ? '<i class="fas fa-check-double" style="color: var(--primary);"></i>' : ''}
                        </div>
                    </div>
                `;
            }).join('');

            // Scroll to bottom
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Send message
        document.getElementById('messageForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const messageText = document.getElementById('messageText').value.trim();
            if (!messageText) return;

            const result = Messaging.sendMessage(currentConversationId, messageText);

            if (result.success) {
                document.getElementById('messageText').value = '';
                loadMessages();
                loadConversations();
            } else {
                UI.showToast(result.error, 'error');
            }
        });

        // Search conversations
        document.getElementById('searchConversations').addEventListener('input', Utils.debounce((e) => {
            const query = e.target.value.toLowerCase();
            const items = document.querySelectorAll('.conversation-item');

            items.forEach(item => {
                const text = item.textContent.toLowerCase();
                item.style.display = text.includes(query) ? 'flex' : 'none';
            });
        }, 300));

        // Initial load
        loadConversations();

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (messageRefreshInterval) {
                clearInterval(messageRefreshInterval);
            }
        });

        // Logout
        document.getElementById('userMenuBtn').addEventListener('click', () => {
            if (confirm('Do you want to logout?')) {
                Auth.logout();
            }
        });

        Notifications.updateBadge();
    </script>
</body>

</html>
